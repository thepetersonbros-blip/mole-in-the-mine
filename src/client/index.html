<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#14101c" />
<title>Mole in the Mine</title>
<style>
  :root {
    --bg: #14101c;
    --panel: #221a30;
    --panel2: #2d2240;
    --ink: #f0e9d8;
    --dim: #a99c8a;
    --gold: #ffd84a;
    --danger: #e23b3b;
    --ok: #3bb54a;
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--ink);
    font-family: "Segoe UI", system-ui, sans-serif;
    overflow: hidden; overscroll-behavior: none;
    height: 100dvh;
  }
  #game {
    position: fixed; inset: 0; width: 100%; height: 100%;
    image-rendering: pixelated; touch-action: none;
    background: #0b0e1d;
  }
  #ui { position: fixed; inset: 0; pointer-events: none; }
  #ui > * { pointer-events: auto; }

  .screen {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: radial-gradient(ellipse at 50% 30%, #241b33 0%, #14101c 70%);
    padding: calc(16px + var(--sat)) 16px calc(16px + var(--sab));
    overflow-y: auto;
  }
  .title { font-size: clamp(30px, 7vw, 52px); font-weight: 900; letter-spacing: 2px;
    color: var(--gold); text-shadow: 0 3px 0 #7a5a00, 0 6px 18px #000; text-align: center; }
  .subtitle { color: var(--dim); margin-top: -10px; text-align: center; }
  .card {
    background: var(--panel); border: 2px solid #3a2d52; border-radius: 14px;
    padding: 18px; width: min(440px, 94vw); display: flex; flex-direction: column; gap: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
  }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  input[type=text] {
    background: #171221; color: var(--ink); border: 2px solid #3a2d52; border-radius: 8px;
    padding: 12px; font-size: 18px; width: 100%; outline: none; text-transform: none;
  }
  input.code { text-transform: uppercase; letter-spacing: 8px; font-weight: 800; text-align: center; }
  button {
    background: var(--gold); color: #2a1d00; font-weight: 800; border: 0; border-radius: 10px;
    padding: 12px 18px; font-size: 17px; cursor: pointer; touch-action: manipulation;
  }
  button:active { transform: translateY(1px); }
  button.secondary { background: var(--panel2); color: var(--ink); border: 2px solid #4a3a6a; }
  button.danger { background: var(--danger); color: #fff; }
  button:disabled { opacity: .45; cursor: default; }
  .hats { display: flex; gap: 8px; flex-wrap: wrap; }
  .hat {
    width: 38px; height: 38px; border-radius: 50%; border: 3px solid #0008; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 13px; color: #000c; font-weight: 900;
  }
  .hat.sel { border-color: #fff; box-shadow: 0 0 0 3px var(--gold); }
  .hat.taken { opacity: .25; cursor: default; }
  .err { color: #ff8a8a; min-height: 20px; font-size: 14px; text-align: center; }
  .roster { display: flex; flex-direction: column; gap: 6px; }
  .roster .p { display: flex; align-items: center; gap: 10px; background: #171221; border-radius: 8px; padding: 8px 10px; }
  .roster .chip { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #0008; flex: none; }
  .roster .nm { flex: 1; font-weight: 600; }
  .roster .tag { font-size: 12px; color: var(--dim); }
  .codebig { font-size: 40px; letter-spacing: 12px; font-weight: 900; color: var(--gold); text-align: center; }
  .hint { color: var(--dim); font-size: 13.5px; line-height: 1.45; }

  /* ----- HUD ----- */
  #hud { position: absolute; inset: 0; display: none; pointer-events: none; }
  #hud.on { display: block; }
  #hud .top {
    position: absolute; top: calc(6px + var(--sat)); left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; align-items: center; background: #14101ccc; border: 1px solid #3a2d52;
    border-radius: 10px; padding: 6px 12px; backdrop-filter: blur(4px);
  }
  #hud .quota { font-weight: 800; color: var(--gold); }
  #hud .timer { font-variant-numeric: tabular-nums; font-weight: 700; }
  #hud .timer.low { color: var(--danger); }
  .qbar { width: 130px; height: 10px; background: #171221; border-radius: 6px; overflow: hidden; border: 1px solid #3a2d52; }
  .qbar > div { height: 100%; background: linear-gradient(90deg, #c9a227, var(--gold)); width: 0%; transition: width .3s; }
  #carry {
    position: absolute; left: 10px; bottom: calc(10px + var(--sab)); background: #14101ccc;
    border: 1px solid #3a2d52; border-radius: 10px; padding: 8px 12px; font-weight: 800; color: var(--gold);
  }
  #prompt {
    position: absolute; left: 50%; bottom: calc(96px + var(--sab)); transform: translateX(-50%);
    background: #14101cdd; border: 1px solid var(--gold); color: var(--ink);
    padding: 8px 14px; border-radius: 10px; font-size: 15px; display: none; text-align: center;
  }
  #toolbar {
    position: absolute; right: 10px; bottom: calc(10px + var(--sab));
    display: flex; gap: 8px; align-items: flex-end;
  }
  .tool {
    width: 56px; height: 56px; border-radius: 12px; background: var(--panel2); border: 2px solid #4a3a6a;
    color: var(--ink); font-size: 11px; font-weight: 700; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px; position: relative; padding: 0;
  }
  .tool .ico { font-size: 20px; line-height: 1; }
  .tool .n { position: absolute; top: -6px; right: -6px; background: var(--gold); color: #2a1d00;
    border-radius: 10px; min-width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; }
  .tool.cd::after { content: ""; position: absolute; inset: 0; border-radius: 10px;
    background: conic-gradient(#0009 var(--cd, 0%), transparent 0); }
  .tool.zero { opacity: .4; }
  #touchpad { position: absolute; inset: 0; display: none; }
  #stick {
    position: absolute; width: 120px; height: 120px; border-radius: 50%;
    border: 2px solid #ffffff33; background: #ffffff0d; display: none;
  }
  #stick .nub { position: absolute; width: 48px; height: 48px; border-radius: 50%; background: #ffffff2e;
    left: 36px; top: 36px; }
  #bigact {
    position: absolute; right: 18px; bottom: calc(86px + var(--sab));
    width: 74px; height: 74px; border-radius: 50%; font-size: 13px; display: none;
  }
  #bigatk {
    position: absolute; right: 104px; bottom: calc(74px + var(--sab));
    width: 60px; height: 60px; border-radius: 50%; font-size: 12px; display: none;
    background: var(--danger); color: #fff;
  }
  body.touch #bigact, body.touch #bigatk { display: flex; align-items: center; justify-content: center; }
  body.touch #touchpad { display: block; }

  #moledrawer {
    position: absolute; left: 50%; transform: translateX(-50%); bottom: calc(10px + var(--sab));
    display: none; gap: 8px; background: #2a0f14cc; border: 2px solid #7a2030; border-radius: 14px; padding: 8px;
  }
  #moledrawer.on { display: flex; }
  #moledrawer .tool { background: #3a141c; border-color: #7a2030; }
  #moledrawer .stash { color: #ff9a9a; font-size: 12px; font-weight: 800; align-self: center; padding: 0 6px; }
  #hatpick { position: absolute; left: 50%; transform: translateX(-50%); bottom: calc(86px + var(--sab));
    display: none; gap: 6px; background: #2a0f14ee; border: 2px solid #7a2030; border-radius: 12px; padding: 10px; flex-wrap: wrap; width: 280px; justify-content: center; }
  #hatpick.on { display: flex; }

  #buried {
    position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #000000d8 30%, #000 75%); gap: 14px; text-align: center;
  }
  #buried.on { display: flex; }
  #buried h2 { color: #ff9a5a; margin: 0; }
  #curtain {
    position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center;
    background: #14101cee; gap: 12px; text-align: center; z-index: 50;
  }
  #curtain.on { display: flex; }
  .spin { width: 38px; height: 38px; border: 4px solid #3a2d52; border-top-color: var(--gold);
    border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* meeting + scoreboard overlays */
  .overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; background: #14101cf2; padding: calc(14px + var(--sat)) 14px calc(14px + var(--sab));
    overflow-y: auto; z-index: 30;
  }
  .votecard { display: flex; align-items: center; gap: 10px; background: var(--panel); border: 2px solid #3a2d52;
    border-radius: 10px; padding: 10px 12px; width: min(420px, 92vw); }
  .votecard .chip { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #0008; }
  .votecard .nm { flex: 1; font-weight: 700; }
  .votecard.voted { border-color: var(--gold); }
  .bigbanner { font-size: clamp(26px, 6vw, 44px); font-weight: 900; text-align: center; }
  .bigbanner.miners { color: var(--gold); }
  .bigbanner.mole { color: var(--danger); }
  table.stats { border-collapse: collapse; background: var(--panel); border-radius: 10px; overflow: hidden; font-size: 14px; }
  table.stats th, table.stats td { padding: 7px 10px; text-align: center; }
  table.stats th { background: var(--panel2); color: var(--dim); font-size: 12px; }
  table.stats td.nm { text-align: left; font-weight: 700; }
  .hathist { display: flex; gap: 6px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .toast {
    position: absolute; top: calc(54px + var(--sat)); left: 50%; transform: translateX(-50%);
    background: #14101cdd; border: 1px solid #3a2d52; padding: 6px 12px; border-radius: 8px;
    font-size: 14px; transition: opacity .4s; z-index: 40; pointer-events: none;
  }
  .keys { position: absolute; left: 10px; top: calc(8px + var(--sat)); font-size: 12px; color: var(--dim);
    background: #14101caa; padding: 6px 9px; border-radius: 8px; line-height: 1.5; }
  body.touch .keys { display: none; }
</style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
